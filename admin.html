<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더원주택관리 - 관리자 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... (생략: 기존 스타일 그대로) ... */
    </style>
</head>
<body>
    <!-- ... (생략: 기존 body 내용 그대로) ... -->
    <!-- Google APIs 스크립트 -->
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script>
        // Google API 설정
        const CLIENT_ID = '720685489156-p4hou9aacmcpb1b6pdckjj90isfl5ru5.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyD0tH5ebOAlUMnGrrLKdLAM3EzIuDAfPcA';
        const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
        const GOOGLE_SHEET_ID = '1bFfjjg_Rn0VUx2JTFuaoJtG9WbxmQJiqPhKF4q9YDxg';

        let tokenClient;
        let isAuthorized = false;
        let gapiReady = false;
        let gisReady = false;
        let customersData = [], billsData = [], paymentsData = [], settingsData = {}, currentCustomerId = null;

        // ... (생략: safeString, safeNumber, showAlert 등 기존 함수) ...

        // 인증 상태 UI 업데이트
        function updateConnectionStatus(message, connected) {
            const status = document.getElementById('connectionStatus');
            if (!status) return;
            status.querySelector('span').textContent = message;
            status.querySelector('.status-dot').style.background = connected ? '#4ade80' : '#e53e3e';
        }

        // 인증 상태에 따라 UI 토글
        function setSigninStatus(signedIn) {
            isAuthorized = signedIn;
            document.getElementById('authSection').style.display = signedIn ? 'none' : 'block';
            document.getElementById('signoutButton').style.display = signedIn ? 'inline-block' : 'none';
            updateConnectionStatus(signedIn ? '연결됨' : '로그인 필요', signedIn);
            if (signedIn) {
                // 데이터 로드
                loadAllData();
            } else {
                // 데이터 초기화
                customersData = [];
                billsData = [];
                paymentsData = [];
                settingsData = {};
            }
        }

        // GAPI, GIS 모두 준비되면 인증 버튼 활성화
        function checkIfReady() {
            if (gapiReady && gisReady) {
                document.getElementById('authSection').querySelector('.btn-primary').disabled = false;
                updateConnectionStatus('로그인 필요', false);
            }
        }

        // 구글 로그인
        function handleAuthClick() {
            tokenClient.requestAccessToken();
        }

        // 로그아웃
        function handleSignoutClick() {
            if (gapi && gapi.auth2) {
                gapi.auth2.getAuthInstance().signOut();
            }
            setSigninStatus(false);
        }

        // GAPI 로드 완료 콜백
        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        // GAPI 클라이언트 초기화
        function initializeGapiClient() {
            gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            }).then(() => {
                gapiReady = true;
                checkIfReady();
            }, (error) => {
                updateConnectionStatus('GAPI 초기화 실패', false);
                showAlert('Google Sheets API 초기화에 실패했습니다.', 'error');
            });
        }

        // GIS 로드 완료 콜백
        function gisLoaded() {
            gisReady = true;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse.error !== undefined) {
                        showAlert('로그인 실패: ' + tokenResponse.error, 'error');
                        updateConnectionStatus('로그인 실패', false);
                    } else {
                        setSigninStatus(true);
                    }
                },
            });
            checkIfReady();
        }

        // 모든 데이터 로드
        async function loadAllData() {
            try {
                await loadCustomers();
                await loadBills();
                await loadPayments();
                await loadSettings();
                displayCustomers();
                displayBills();
                displayPayments();
                displaySettings();
                refreshDashboard();
            } catch (e) {
                showAlert('데이터 로드 중 오류: ' + e.message, 'error');
            }
        }

        // ... (생략: 기존의 loadBills, displayBills, loadPayments, displayPayments, loadSettings, displaySettings, 기타 함수들) ...
    </script>
</body>
</html>

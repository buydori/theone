    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script>
        // Google API 설정
        const CLIENT_ID = '720685489156-p4hou9aacmcpb1b6pdckjj90isfl5ru5.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyD0tH5ebOAlUMnGrrLKdLAM3EzIuDAfPcA';
        const DISCOVERY_DOC = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
        const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';
        const GOOGLE_SHEET_ID = '1bFfjjg_Rn0VUx2JTFuaoJtG9WbxmQJiqPhKF4q9YDxg';

        let tokenClient;
        let isAuthorized = false;
        let gapiReady = false;
        let gisReady = false;
        let customersData = [], billsData = [], paymentsData = [], settingsData = {}, currentCustomerId = null;

        // 한글 문자열 안전 처리 함수
        function safeString(str) {
            if (!str) return '';
            return String(str).trim();
        }

        // 숫자 안전 처리 함수
        function safeNumber(num) {
            const parsed = parseInt(num);
            return isNaN(parsed) ? 0 : parsed;
        }

        // 알림 표시 함수
        function showAlert(message, type = 'info') {
            // 기존 알림 제거
            const existingAlert = document.querySelector('.alert');
            if (existingAlert) {
                existingAlert.remove();
            }

            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            document.body.appendChild(alert);

            // 3초 후 자동 제거
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 3000);
        }

        // 탭 전환 함수
        function showTab(tabName) {
            // 모든 탭 비활성화
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // 선택된 탭 활성화
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // 인증 상태 UI 업데이트
        function updateConnectionStatus(message, connected) {
            const status = document.getElementById('connectionStatus');
            if (!status) return;
            status.querySelector('span').textContent = message;
            status.querySelector('.status-dot').style.background = connected ? '#4ade80' : '#e53e3e';
        }

        // 인증 상태에 따라 UI 토글
        function setSigninStatus(signedIn) {
            isAuthorized = signedIn;
            document.getElementById('authSection').style.display = signedIn ? 'none' : 'block';
            document.getElementById('signoutButton').style.display = signedIn ? 'inline-block' : 'none';
            updateConnectionStatus(signedIn ? '연결됨' : '로그인 필요', signedIn);
            if (signedIn) {
                // 데이터 로드
                loadAllData();
            } else {
                // 데이터 초기화
                customersData = [];
                billsData = [];
                paymentsData = [];
                settingsData = {};
            }
        }

        // GAPI, GIS 모두 준비되면 인증 버튼 활성화
        function checkIfReady() {
            if (gapiReady && gisReady) {
                const authButton = document.getElementById('authSection').querySelector('.btn-primary');
                if (authButton) {
                    authButton.disabled = false;
                }
                updateConnectionStatus('로그인 필요', false);
            }
        }

        // 구글 로그인
        function handleAuthClick() {
            if (tokenClient) {
                tokenClient.requestAccessToken();
            } else {
                showAlert('Google API가 아직 로드되지 않았습니다. 잠시 후 다시 시도해주세요.', 'warning');
            }
        }

        // 로그아웃
        function handleSignoutClick() {
            if (gapi && gapi.auth2) {
                gapi.auth2.getAuthInstance().signOut();
            }
            setSigninStatus(false);
        }

        // GAPI 로드 완료 콜백
        function gapiLoaded() {
            console.log('GAPI 스크립트 로드됨');
            gapi.load('client', initializeGapiClient);
        }

        // GAPI 클라이언트 초기화
        function initializeGapiClient() {
            console.log('GAPI 클라이언트 초기화 시작');
            gapi.client.init({
                apiKey: API_KEY,
                discoveryDocs: [DISCOVERY_DOC],
            }).then(() => {
                gapiReady = true;
                console.log('GAPI 클라이언트 초기화 완료');
                checkIfReady();
            }).catch((error) => {
                console.error('GAPI 클라이언트 초기화 실패:', error);
                updateConnectionStatus('GAPI 초기화 실패', false);
                showAlert('Google Sheets API 초기화에 실패했습니다.', 'error');
            });
        }

        // GIS 로드 완료 콜백
        function gisLoaded() {
            console.log('GIS 스크립트 로드됨');
            gisReady = true;
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    console.log('OAuth 응답:', tokenResponse);
                    if (tokenResponse.error !== undefined) {
                        console.error('OAuth 오류:', tokenResponse.error);
                        showAlert('로그인 실패: ' + tokenResponse.error, 'error');
                        updateConnectionStatus('로그인 실패', false);
                    } else {
                        console.log('OAuth 성공');
                        setSigninStatus(true);
                    }
                },
            });
            checkIfReady();
        }

        // 모든 데이터 로드
        async function loadAllData() {
            try {
                showAlert('데이터를 불러오는 중...', 'info');
                // 실제 데이터 로드 함수들은 추후 구현
                showAlert('데이터 로드 완료', 'success');
            } catch (e) {
                showAlert('데이터 로드 중 오류: ' + e.message, 'error');
            }
        }

        // 대시보드 새로고침
        function refreshDashboard() {
            if (!isAuthorized) {
                showAlert('먼저 Google 계정으로 로그인해주세요.', 'warning');
                return;
            }
            showAlert('대시보드가 새로고침되었습니다.', 'success');
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function() {
            console.log('페이지 로드 완료');
            updateConnectionStatus('시스템 준비 중...', false);
        });
    </script>

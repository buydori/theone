<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One - Thumbnail Maker</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 800px; width: 100%; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; }
        .upload-section { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; text-align: left; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #666; }
        input[type="text"], input[type="file"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        #preview-container { margin-top: 20px; border: 2px dashed #ccc; padding: 10px; border-radius: 10px; min-height: 300px; display: flex; align-items: center; justify-content: center; position: relative; }
        canvas { max-width: 100%; height: auto; border-radius: 5px; }
        .download-btn { background-color: #28a745; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>The One 썸네일 생성기</h1>
    
    <div class="upload-section">
        <div class="input-group">
            <label>1. 배경 사진 업로드</label>
            <input type="file" id="bgInput" accept="image/*">
        </div>
        <div class="input-group">
            <label>2. 로고 파일 업로드 (PNG 권장)</label>
            <input type="file" id="logoInput" accept="image/*">
        </div>
    </div>

    <div class="input-group" style="margin-bottom: 20px;">
        <label>3. 썸네일 제목 입력</label>
        <input type="text" id="thumbTitle" placeholder="중앙에 표시될 제목을 입력하세요">
    </div>

    <button onclick="generateThumbnail()">썸네일 생성하기</button>

    <div id="preview-container">
        <canvas id="mainCanvas"></canvas>
    </div>

    <button id="downloadBtn" class="download-btn" style="display:none;" onclick="downloadImage()">이미지 저장하기</button>
</div>

<script>
    const bgInput = document.getElementById('bgInput');
    const logoInput = document.getElementById('logoInput');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');

    async function generateThumbnail() {
        const bgFile = bgInput.files[0];
        const logoFile = logoInput.files[0];
        const titleText = document.getElementById('thumbTitle').value;

        if (!bgFile || !logoFile) {
            alert("배경 사진과 로고 파일을 모두 선택해주세요!");
            return;
        }

        // 이미지 로드 대기
        const bgImg = await loadImage(URL.createObjectURL(bgFile));
        const logoImg = await loadImage(URL.createObjectURL(logoFile));

        // 1. 캔버스 크기 설정 (배경 이미지 기준)
        canvas.width = bgImg.width;
        canvas.height = bgImg.height;

        // 2. 배경 그리기
        ctx.drawImage(bgImg, 0, 0);

        // 3. 중앙 반투명 로고 그리기
        const logoScale = 0.6; // 캔버스 가로의 60% 크기
        const logoW = canvas.width * logoScale;
        const logoH = logoW * (logoImg.height / logoImg.width);
        const logoX = (canvas.width - logoW) / 2;
        const logoY = (canvas.height - logoH) / 2;

        ctx.save();
        ctx.globalAlpha = 0.4; // 40% 반투명도
        ctx.drawImage(logoImg, logoX, logoY, logoW, logoH);
        ctx.restore(); // 투명도 리셋 (1.0으로 복구)

        // 4. 선명한 제목 그리기
        if (titleText) {
            const fontSize = canvas.width * 0.08; // 이미지 크기에 비례
            ctx.font = `bold ${fontSize}px 'Noto Sans KR', sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // 가독성을 위한 검은색 외곽선
            ctx.strokeStyle = "rgba(0, 0, 0, 0.8)";
            ctx.lineWidth = fontSize * 0.12;
            ctx.strokeText(titleText, canvas.width / 2, canvas.height / 2);

            // 선명한 흰색 글씨
            ctx.fillStyle = "#ffffff";
            ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
            ctx.shadowBlur = 15;
            ctx.fillText(titleText, canvas.width / 2, canvas.height / 2);
        }

        document.getElementById('downloadBtn').style.display = 'inline-block';
    }

    // 이미지 로드 Helper 함수
    function loadImage(src) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.src = src;
        });
    }

    // 다운로드 함수
    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'the_one_thumbnail.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    }
</script>

</body>
</html>

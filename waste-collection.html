<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>더원클린앤케어 - 파주시 폐기물 종합 안내</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-green-50 p-4">
  <div class="max-w-6xl mx-auto" id="app">
    <!-- Content will be rendered here -->
  </div>
  <script>
    // 데이터
    const wasteCompanies = [
      { area: '운정1동, 운정4동', company: '(주)영인환경', phone: '031-934-0326', districts: ['운정1동', '운정4동'] },
      { area: '운정3동, 운정6동', company: '(주)이룸', phone: '031-947-2778', districts: ['운정3동', '운정6동'] },
      { area: '운정5동', company: '(주)진환경', phone: '031-942-6687', districts: ['운정5동'] },
      { area: '운정2동, 교하동', company: '(주)대조은환경', phone: '031-944-7749', districts: ['운정2동', '교하동'] },
      { area: '금촌1동', company: '(주)파주협경공사', phone: '031-953-4523', districts: ['금촌1동'] },
      { area: '금촌2동, 금촌3동', company: '(주)하나환경', phone: '031-8071-1192', districts: ['금촌2동', '금촌3동'] },
      { area: '조리읍', company: '(주)한빛환경', phone: '031-941-7611', districts: ['조리읍'] },
      { area: '파주읍, 광탄면', company: '(주)늘푸른환경', phone: '031-957-8383', districts: ['파주읍', '광탄면'] },
      { area: '문산읍(1권역), 창만면', company: '(주)엠에스환경', phone: '031-945-3655', districts: ['문산읍1권역', '창만면'] },
      { area: '문산읍(2권역), 파평면', company: '(주)동금환경', phone: '031-941-5231', districts: ['문산읍2권역', '파평면'] },
      { area: '법원읍, 적성면', company: '(주)푸른숲', phone: '031-959-2345', districts: ['법원읍', '적성면'] },
      { area: '탄현면', company: '(주)세아환경', phone: '031-944-3582', districts: ['탄현면'] },
      { area: '월롱면', company: '(주)클린환경', phone: '031-941-9981', districts: ['월롱면'] },
      { area: '운정동 도로청소', company: '(주)두원종합관리', phone: '031-946-5793', districts: ['운정동도로청소'] },
      { area: '자유로 및 운정외지역 도로청소', company: '도로청소(주)', phone: '031-949-1830', districts: ['자유로', '운정외지역도로청소'] }

    // 상태
    let searchAddress = '';
    let selectedCompany = null;
    let activeTab = 'collection';

    // 렌더 함수
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-gray-800 mb-2">
            더원클린앤케어 - 파주시 폐기물 종합 안내
          </h1>
          <p class="text-gray-600">
            생활폐기물 수거업체 정보 및 대형폐기물 스티커 수수료 안내
          </p>
        </div>
        <div class="bg-white rounded-lg shadow-lg mb-6">
          <div class="flex border-b border-gray-200">
            <button id="tab-collection" class="flex-1 py-3 px-4 text-center font-medium ${activeTab === 'collection' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-gray-700'}">
              <span class="inline-flex items-center gap-2">
                <i data-lucide="trash-2" class="h-5 w-5"></i>
                수거업체 안내
              </span>
            </button>
            <button id="tab-sticker" class="flex-1 py-3 px-4 text-center font-medium ${activeTab === 'sticker' ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-gray-700'}">
              <span class="inline-flex items-center gap-2">
                <i data-lucide="dollar-sign" class="h-5 w-5"></i>
                스티커 수수료
              </span>
            </button>
          </div>
        </div>
        ${activeTab === 'collection' ? renderCollectionTab() : renderStickerTab()}
      `;
      lucide.createIcons();
      addEventListeners();
    }

    // 수거업체 탭 렌더
    function renderCollectionTab() {
      return `
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
          <div class="flex gap-3 mb-4">
            <div class="flex-1 relative">
              <i data-lucide="map-pin" class="absolute left-3 top-3 h-5 w-5 text-gray-400"></i>
              <input
                id="search-input"
                type="text"
                placeholder="주소를 입력하세요 (예: 운정1동, 금촌2동, 조리읍 등)"
                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                value="${searchAddress.replace(/"/g, '&quot;')}"
              />
            </div>
            <button
              id="search-btn"
              class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2"
            >
              <i data-lucide="search" class="h-5 w-5"></i>
              검색
            </button>
          </div>
          ${selectedCompany ? renderCompanyResult(selectedCompany) : ''}
        </div>
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-bold text-gray-800 mb-6">전체 수거업체 목록</h2>
          <div class="overflow-x-auto">
            <table class="w-full border-collapse">
              <thead>
                <tr class="bg-gray-50">
                  <th class="border border-gray-300 px-4 py-3 text-left font-semibold text-gray-700">담당 구역</th>
                  <th class="border border-gray-300 px-4 py-3 text-left font-semibold text-gray-700">업체명</th>
                  <th class="border border-gray-300 px-4 py-3 text-left font-semibold text-gray-700">연락처</th>
                </tr>
              </thead>
              <tbody>
                ${wasteCompanies.map(company => `
                  <tr class="hover:bg-gray-50">
                    <td class="border border-gray-300 px-4 py-3 text-gray-800">${company.area}</td>
                    <td class="border border-gray-300 px-4 py-3 text-gray-800">${company.company}</td>
                    <td class="border border-gray-300 px-4 py-3">
                      <span class="flex items-center gap-2">
                        <i data-lucide="phone" class="h-4 w-4 text-blue-600"></i>
                        <a href="tel:${company.phone}" class="text-blue-600 hover:text-blue-800 font-medium">${company.phone}</a>
                      </span>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div class="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
          <h3 class="font-semibold text-yellow-800 mb-2">안내사항</h3>
          <ul class="text-sm text-yellow-700 space-y-1">
            <li>• 예외사항: 문산읍(1권역) 선유3-8리, 이천리를 제외한 모든 지역</li>
            <li>• 동금환경: 문산읍(2권역) 선유3-8리, 이천리</li>
            <li>• 정확한 동/읍/면 이름을 입력하시면 담당 업체를 찾을 수 있습니다</li>
          </ul>
        </div>
      `;
    }

    // 검색 결과 렌더
    function renderCompanyResult(company) {
      return `
        <div class="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
          <h3 class="text-lg font-semibold text-green-800 mb-3 flex items-center gap-2">
            <i data-lucide="building-2" class="h-5 w-5"></i>
            해당 지역 수거업체
          </h3>
          <div class="grid md:grid-cols-2 gap-4">
            <div>
              <p class="text-sm text-gray-600 mb-1">담당 구역</p>
              <p class="font-medium text-gray-800">${company.area}</p>
            </div>
            <div>
              <p class="text-sm text-gray-600 mb-1">업체명</p>
              <p class="font-medium text-gray-800">${company.company}</p>
            </div>
            <div class="md:col-span-2">
              <p class="text-sm text-gray-600 mb-1">연락처</p>
              <span class="flex items-center gap-2">
                <i data-lucide="phone" class="h-4 w-4 text-blue-600"></i>
                <a href="tel:${company.phone}" class="text-lg font-semibold text-blue-600 hover:text-blue-800">${company.phone}</a>
              </span>
            </div>
          </div>
        </div>
      `;
    }

    // 스티커 수수료 탭 렌더
    function renderStickerTab() {
      return `
        <div class="bg-white rounded-lg shadow-lg p-6">
          <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
            <i data-lucide="recycle" class="h-6 w-6 text-green-600"></i>
            대형폐기물 수집·운반·처리 수수료
          </h2>
          ${renderStickerFees()}
        </div>
      `;
    }

    // 스티커 수수료 안내 렌더
    function renderStickerFees() {
      return `
        <div class="space-y-6">
          <div class="bg-red-50 border border-red-200 rounded-lg p-4">
            <h3 class="font-bold text-red-800 mb-2">중요 안내사항</h3>
            <ul class="text-sm text-red-700 space-y-1">
              <li>• 모든 규격은 분리기준이며, 기준이 명시되지 않은 경우는 긴 면을 기준으로 한다.</li>
              <li>• 상기에 명시되지 아니한 품목은 가장 유사한 품목의 수수료를 적용한다.</li>
              <li>• 상기에 명시된 품목이더라도 일반적으로 사용되는 가정용품과 비교하여 큰 경우에는 크기가 무게 동일 고려하여 파주시에서 가격을 결정할 수 있다.</li>
            </ul>
          </div>
          <div class="grid lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-lg border border-gray-200 p-4">
              <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="home" class="h-5 w-5 text-blue-600"></i>
                가구류
              </h3>
              <div class="space-y-3">
                <div class="bg-blue-50 p-3 rounded">
                  <h4 class="font-semibold text-blue-800 mb-2">침대</h4>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>싱글 120cm 이하: <span class="font-medium">10,000원</span></div>
                    <div>더블 120cm 이상: <span class="font-medium">15,000원</span></div>
                    <div>이단 침대: <span class="font-medium">23,000원</span></div>
                    <div>침대 프레임: <span class="font-medium">2,000원</span></div>
                    <div>매트리스 싱글: <span class="font-medium">3,000원</span></div>
                    <div>매트리스 더블: <span class="font-medium">6,000원</span></div>
                  </div>
                </div>
                <div class="bg-green-50 p-3 rounded">
                  <h4 class="font-semibold text-green-800 mb-2">소파 및 의자</h4>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>1인용: <span class="font-medium">2,000원</span></div>
                    <div>2인용: <span class="font-medium">4,000원</span></div>
                    <div>소파: <span class="font-medium">8,000원</span></div>
                    <div>회전의자: <span class="font-medium">2,000원</span></div>
                  </div>
                </div>
                <div class="bg-yellow-50 p-3 rounded">
                  <h4 class="font-semibold text-yellow-800 mb-2">테이블</h4>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>책상: <span class="font-medium">4,000원</span></div>
                    <div>식탁: <span class="font-medium">20,000원</span></div>
                    <div>화장대: <span class="font-medium">3,000원</span></div>
                  </div>
                </div>
              </div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-4">
              <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                <i data-lucide="package" class="h-5 w-5 text-green-600"></i>
                생활용품
              </h3>
              <div class="space-y-3">
                <div class="bg-purple-50 p-3 rounded">
                  <h4 class="font-semibold text-purple-800 mb-2">전자제품</h4>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>세탁기: <span class="font-medium">8,000원</span></div>
                    <div>냉장고: <span class="font-medium">8,000원</span></div>
                    <div>김치냉장고: <span class="font-medium">4,000원</span></div>
                    <div>전자레인지: <span class="font-medium">2,000원</span></div>
                    <div>오븐: <span class="font-medium">5,000원</span></div>
                    <div>청소기: <span class="font-medium">2,000원</span></div>
                    <div>선풍기: <span class="font-medium">2,000원</span></div>
                    <div>에어컨: <span class="font-medium">1,000원</span></div>
                  </div>
                </div>
                <div class="bg-pink-50 p-3 rounded">
                  <h4 class="font-semibold text-pink-800 mb-2">기타 생활용품</h4>
                  <div class="grid grid-cols-2 gap-2 text-sm">
                    <div>자전거: <span class="font-medium">2,000원</span></div>
                    <div>캐리어: <span class="font-medium">1,000원</span></div>
                    <div>골프백: <span class="font-medium">5,000원</span></div>
                    <div>운동용품: <span class="font-medium">4,000원</span></div>
                    <div>화분: <span class="font-medium">5,000원</span></div>
                    <div>거울: <span class="font-medium">1,000원</span></div>
                    <div>카펫: <span class="font-medium">2,000원</span></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <h3 class="font-bold text-blue-800 mb-2 flex items-center gap-2">
              <i data-lucide="phone" class="h-5 w-5"></i>
              대형 폐기물 신청 문의
            </h3>
            <p class="text-blue-700 mb-2">파주시 자원순환과: <strong>031-940-4731~4734</strong></p>
            <p class="text-sm text-blue-600">
              대형 폐기물 배출 시에는 반드시 스티커를 구매하여 부착 후 배출하시기 바랍니다.
            </p>
          </div>
        </div>
      `;
    }

    // 이벤트 리스너 등록
    function addEventListeners() {
      // 탭 전환
      document.getElementById('tab-collection').onclick = () => {
        activeTab = 'collection';
        render();
      };
      document.getElementById('tab-sticker').onclick = () => {
        activeTab = 'sticker';
        render();
      };
      // 검색
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.oninput = (e) => {
          searchAddress = e.target.value;
        };
        searchInput.onkeypress = (e) => {
          if (e.key === 'Enter') handleSearch();
        };
      }
      const searchBtn = document.getElementById('search-btn');
      if (searchBtn) {
        searchBtn.onclick = handleSearch;
      }
    }

    // 검색 함수
    function handleSearch() {
      if (!searchAddress.trim()) {
        alert('주소를 입력해주세요.');
        return;
      }
      const foundCompany = wasteCompanies.find(company =>
        company.districts.some(district =>
          searchAddress.includes(district.replace('1권역', '').replace('2권역', '')) ||
          searchAddress.includes(district) ||
          (district.includes('도로청소') && searchAddress.includes('도로'))
        )
      );
      if (foundCompany) {
        selectedCompany = foundCompany;
      } else {
        selectedCompany = null;
        alert('해당 주소의 수거업체를 찾을 수 없습니다. 정확한 동/읍/면 이름을 입력해주세요.');
      }
      render();
    }

    // 최초 렌더
    render();
  </script>
</body>
</html>
